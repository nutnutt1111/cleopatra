{{> auth-start title="เข้าสู่ระบบพนักงาน" }}

<div class="w-full max-w-md mx-auto">
    <div class="bg-card border border-border rounded-3xl p-6 sm:p-8 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/40 via-primary to-primary/40"></div>

        <div class="text-center mb-8">
            <div
                class="w-14 h-14 bg-gradient-to-br from-primary to-primary/80 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-primary/20">
                <svg class="w-7 h-7 text-primary-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-foreground mb-1">เข้าสู่ระบบพนักงาน</h1>
            <p class="text-sm text-muted-foreground">ใช้อีเมลและรหัสผ่านของคุณ</p>
        </div>

        <div id="config-warning"
            class="hidden mb-4 rounded-xl border border-amber-500/30 bg-amber-500/10 px-4 py-3 text-sm text-amber-700 dark:text-amber-300">
            ยังไม่ได้ตั้งค่า Supabase — คัดลอก `.env.example` เป็น `.env` แล้วใส่ URL และ Anon Key
        </div>

        <div id="login-info"
            class="hidden mb-4 rounded-xl border border-primary/20 bg-primary/5 px-4 py-3 text-sm text-primary">
        </div>

        <div id="login-error"
            class="hidden mb-4 rounded-xl border border-destructive/30 bg-destructive/10 px-4 py-3 text-sm text-destructive">
        </div>

        <form id="email-login-form" class="space-y-4" novalidate>
            <div>
                <label for="login-email" class="block text-sm font-medium text-foreground mb-1.5">อีเมล</label>
                <input id="login-email" name="email" type="email" autocomplete="email"
                    placeholder="name@company.com"
                    class="w-full px-4 py-3 bg-muted/50 border border-border rounded-xl text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label for="login-password" class="text-sm font-medium text-foreground">รหัสผ่าน</label>
                    <a href="/forgot-password"
                        class="text-xs text-primary hover:text-primary/80 transition-colors">ลืมรหัสผ่าน?</a>
                </div>
                <input id="login-password" name="password" type="password" autocomplete="current-password"
                    placeholder="••••••••"
                    class="w-full px-4 py-3 bg-muted/50 border border-border rounded-xl text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
            </div>

            <button id="login-submit" type="submit"
                class="w-full px-6 py-3 bg-primary text-primary-foreground font-medium rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
                เข้าสู่ระบบ
            </button>
        </form>

        <div class="mt-6 text-center space-y-3">
            <a id="use-pin-link" href="/enter-pin"
                class="inline-flex text-sm text-primary hover:text-primary/80 font-medium transition-colors">
                ใช้ PIN 6 หลักแทน
            </a>
        </div>
    </div>
</div>

{{> auth-end authScript="/js/auth/login.js" }}
