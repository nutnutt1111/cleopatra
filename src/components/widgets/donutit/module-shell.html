<div class="mb-6" data-donutit-module="{{moduleId}}">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center">
                <i class="{{icon}} text-xl text-primary"></i>
            </div>
            <div>
                <h1 class="text-xl font-semibold text-foreground">{{title}}</h1>
                <p class="text-sm text-muted-foreground">{{subtitle}}</p>
            </div>
        </div>
        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-amber-500/10 text-amber-700 dark:text-amber-400">
            Wave 0 — โครงสร้างพื้นฐาน
        </span>
    </div>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
    <div class="rounded-xl border bg-card p-4">
        <p class="text-sm text-muted-foreground">สถานะโมดูล</p>
        <p class="text-lg font-semibold mt-1">พร้อมเริ่มพัฒนา</p>
    </div>
    <div class="rounded-xl border bg-card p-4">
        <p class="text-sm text-muted-foreground">เซิร์ฟเวอร์</p>
        <p class="text-lg font-semibold mt-1">localhost:3003</p>
    </div>
    <div class="rounded-xl border bg-card p-4">
        <p class="text-sm text-muted-foreground">API</p>
        <p class="text-lg font-semibold mt-1">/api (port 3004)</p>
    </div>
</div>

<div class="rounded-xl border bg-card p-6">
    <h2 class="font-medium mb-2">คำอธิบาย</h2>
    <p class="text-muted-foreground text-sm leading-relaxed">{{description}}</p>
</div>
