{{> auth-start title="ใส่ PIN" }}

{{> auth-card-start }}

<div class="text-center">
    <div
        class="w-14 h-14 bg-gradient-to-br from-primary/20 to-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
        </svg>
    </div>
    <h1 class="text-2xl font-bold text-foreground mb-2">ใส่ PIN</h1>
    <p class="text-sm text-muted-foreground">
        ปลดล็อกด้วย PIN 6 หลัก
        <span id="pin-user-email" class="block mt-1 text-foreground/80 text-xs"></span>
    </p>
</div>

<div id="enter-pin-error"
    class="hidden mt-6 rounded-xl border border-destructive/30 bg-destructive/10 px-4 py-3 text-sm text-destructive text-center">
</div>

<div id="enter-pin-dots" class="pin-dots flex items-center justify-center gap-3 sm:gap-4 mt-8 mb-8 min-h-[1.25rem]"></div>

<div id="enter-pin-keypad" class="pin-keypad grid grid-cols-3 gap-3 max-w-[280px] mx-auto"></div>

<a id="use-email-link" href="/login"
    class="inline-flex mt-8 w-full justify-center text-sm text-primary hover:text-primary/80 font-medium transition-colors">
    เข้าสู่ระบบด้วยอีเมลแทน
</a>

{{> auth-card-end }}

{{> auth-end authScript="/js/auth/enter-pin.js" }}
