{{> auth-start title="ลืมรหัสผ่าน" }}

<div class="w-full max-w-md mx-auto">
    <div class="bg-card border border-border rounded-3xl p-6 sm:p-8 shadow-sm relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/40 via-primary to-primary/40"></div>

        <div class="text-center mb-8">
            <div
                class="w-14 h-14 bg-gradient-to-br from-primary/20 to-primary/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-7 h-7 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-foreground mb-1">ลืมรหัสผ่าน?</h1>
            <p class="text-sm text-muted-foreground">เราจะส่งลิงก์รีเซ็ตรหัสผ่านไปที่อีเมลของคุณ</p>
        </div>

        <div id="forgot-error"
            class="hidden mb-4 rounded-xl border border-destructive/30 bg-destructive/10 px-4 py-3 text-sm text-destructive">
        </div>

        <div id="forgot-success"
            class="hidden mb-4 rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-700 dark:text-emerald-300">
            ส่งลิงก์รีเซ็ตรหัสผ่านแล้ว กรุณาตรวจสอบอีเมลของคุณ
        </div>

        <form id="forgot-password-form" class="space-y-4" novalidate>
            <div>
                <label for="forgot-email" class="block text-sm font-medium text-foreground mb-1.5">อีเมล</label>
                <input id="forgot-email" name="email" type="email" autocomplete="email"
                    placeholder="name@company.com"
                    class="w-full px-4 py-3 bg-muted/50 border border-border rounded-xl text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary">
            </div>

            <button id="forgot-submit" type="submit"
                class="w-full px-6 py-3 bg-primary text-primary-foreground font-medium rounded-xl hover:bg-primary/90 transition-all shadow-lg shadow-primary/20">
                ส่งลิงก์รีเซ็ต
            </button>
        </form>

        <a href="/login"
            class="flex items-center justify-center gap-2 mt-6 text-sm text-muted-foreground hover:text-foreground transition-colors">
            กลับไปหน้าเข้าสู่ระบบ
        </a>
    </div>
</div>

{{> auth-end authScript="/js/auth/forgot-password.js" }}
