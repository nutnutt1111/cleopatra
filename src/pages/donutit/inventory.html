{{> start title="สินค้าคงคลัง — DonutiT" hidePageHeader=true }}

<div class="p-4 lg:p-6" data-donutit-module="inventory">
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-xl font-semibold">สินค้าคงคลัง</h1>
            <p class="text-sm text-muted-foreground">สินค้ามี serial / ไม่มี serial · สต็อก movement</p>
        </div>
        <span class="text-xs px-3 py-1 rounded-full bg-green-500/10 text-green-700">Wave 2</span>
    </div>
    <p id="inv-status" class="text-sm text-muted-foreground mb-4"></p>

    <div class="rounded-xl border bg-card overflow-hidden mb-6">
        <div class="overflow-x-auto">
            <table class="w-full min-w-[700px]">
                <thead class="bg-muted/50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">SKU</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">ชื่อ</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">ประเภท</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">สต็อก</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-muted-foreground">ราคาขาย</th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-muted-foreground">ต้นทุน</th>
                    </tr>
                </thead>
                <tbody id="inv-tbody">
                    <tr><td colspan="6" class="px-4 py-8 text-center text-muted-foreground">กำลังโหลด...</td></tr>
                </tbody>
            </table>
        </div>
        <p class="text-xs text-muted-foreground px-4 py-2">ต้นทุนแสดงเฉพาะ Owner/Manager</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="rounded-xl border bg-card p-4">
            <h2 class="font-medium mb-3">Serial Numbers</h2>
            <div id="inv-serials"></div>
        </div>
        <div class="rounded-xl border bg-card p-4">
            <h2 class="font-medium mb-3">Stock Movement ล่าสุด</h2>
            <div id="inv-moves" class="max-h-64 overflow-y-auto"></div>
        </div>
    </div>
</div>
{{> end }}
