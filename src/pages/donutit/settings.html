{{> start title="เข้าสู่ระบบ — DonutiT" hidePageHeader=true }}

<div class="p-4 lg:p-6 max-w-md mx-auto" data-donutit-module="settings">
    <div class="mb-6 text-center">
        <h1 class="text-xl font-semibold">เข้าสู่ระบบ</h1>
        <p class="text-sm text-muted-foreground">DonutiT Store Management</p>
    </div>

    <div class="rounded-xl border bg-card p-6 space-y-4">
        <div>
            <label class="text-xs text-muted-foreground" for="login-email">อีเมล</label>
            <input id="login-email" type="email" autocomplete="username" placeholder="owner@donutit.local"
                class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
        </div>
        <div>
            <label class="text-xs text-muted-foreground" for="login-password">รหัสผ่าน</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="รหัสผ่าน"
                class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
        </div>
        <button id="btn-login" type="button"
            class="w-full px-4 py-2.5 text-sm font-medium bg-primary text-primary-foreground rounded-lg hover:opacity-90">
            เข้าสู่ระบบ
        </button>
        <button id="btn-logout" type="button"
            class="w-full px-4 py-2 text-sm font-medium border border-border rounded-lg hover:bg-muted">
            ออกจากระบบ
        </button>
        <p id="login-status" class="text-sm text-muted-foreground text-center"></p>
    </div>

    <details class="mt-6 text-sm text-muted-foreground">
        <summary class="cursor-pointer hover:text-foreground">บัญชีทดสอบ (dev)</summary>
        <div class="mt-2 space-y-1 pl-2 border-l-2 border-border">
            <p>owner@donutit.local — Owner</p>
            <p>manager@donutit.local — Manager</p>
            <p>staff@donutit.local — Staff</p>
            <p>hr@donutit.local — HR</p>
            <p>รหัสผ่าน: <code class="bg-muted px-1 rounded">donutit-dev</code></p>
        </div>
    </details>
</div>
{{> end }}
