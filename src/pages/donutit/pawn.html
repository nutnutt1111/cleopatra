{{> start title="จำนำ — DonutiT" hidePageHeader=true }}

<div class="p-4 lg:p-6" data-donutit-module="pawn">
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-xl font-semibold">จำนำ</h1>
            <p class="text-sm text-muted-foreground">ตั๋วจำนำ · ดอกเบี้ย · ไถ่ถอน</p>
        </div>
    </div>
    <p id="pawn-status" class="text-sm text-muted-foreground mb-4"></p>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <div class="space-y-4">
            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">เปิดตั๋วจำนำใหม่</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-muted-foreground">ชื่อลูกค้า</label>
                        <input id="pawn-customer-name" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">เบอร์โทร</label>
                        <input id="pawn-customer-phone" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">รายละเอียดสิ่งของ</label>
                        <input id="pawn-item" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" placeholder="เช่น สร้อยทอง 1 บาท" />
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs text-muted-foreground">เงินต้น (บาท)</label>
                            <input id="pawn-principal" type="number" min="0" step="0.01" class="w-full mt-1 px-3 py-2 rounded-lg border border-border text-sm" />
                        </div>
                        <div>
                            <label class="text-xs text-muted-foreground">ดอกเบี้ย %/งวด</label>
                            <input id="pawn-rate" type="number" min="0" step="0.01" value="2" class="w-full mt-1 px-3 py-2 rounded-lg border border-border text-sm" />
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-xs text-muted-foreground">ช่องทางจ่ายเงินต้น</label>
                            <select id="pawn-channel" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm">
                                <option value="CASH">เงินสด</option>
                                <option value="TRANSFER">โอน</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs text-muted-foreground">รายละเอียดโอน (ถ้ามี)</label>
                            <input id="pawn-transfer-detail" class="w-full mt-1 px-3 py-2 rounded-lg border border-border text-sm" placeholder="ธนาคาร/เลขบัญชี" />
                        </div>
                    </div>
                    <button id="btn-create-ticket" class="w-full px-4 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-lg">
                        เปิดตั๋วจำนำ
                    </button>
                </div>
            </div>
        </div>

        <div class="rounded-xl border bg-card p-4">
            <h2 class="font-medium mb-3">ตั๋วจำนำ</h2>
            <div id="pawn-tickets" class="max-h-[700px] overflow-y-auto"></div>
        </div>
    </div>
</div>
{{> end }}
