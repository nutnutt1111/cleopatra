{{> start title="ขายหน้าร้าน — DonutiT" hidePageHeader=true }}

<div class="p-4 lg:p-6" data-donutit-module="pos">
    <div class="mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
        <div>
            <h1 class="text-xl font-semibold">ขายหน้าร้าน (POS)</h1>
            <p class="text-sm text-muted-foreground">บิลขาย · แยกจ่าย · void</p>
        </div>
    </div>
    <p id="pos-status" class="text-sm text-muted-foreground mb-4"></p>

    <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        <div class="space-y-4">
            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">เพิ่มสินค้า</h2>
                <div class="space-y-3">
                    <select id="pos-product" class="w-full px-3 py-2 rounded-lg border border-border bg-background text-sm"></select>
                    <div id="pos-serial-wrap" class="hidden">
                        <label class="text-xs text-muted-foreground">Serial</label>
                        <select id="pos-serial" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm"></select>
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">จำนวน</label>
                        <input id="pos-qty" type="number" min="1" value="1" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <button id="btn-add-line" class="w-full px-4 py-2 text-sm bg-secondary border border-border rounded-lg hover:bg-muted">เพิ่มในบิล</button>
                </div>
            </div>

            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">ตะกร้า</h2>
                <div id="pos-cart"></div>
                <div class="mt-4 space-y-2 text-sm">
                    <div class="flex justify-between"><span>ยอดรวม</span><span id="pos-subtotal">0.00</span></div>
                    <div class="flex justify-between items-center gap-2">
                        <span>ส่วนลด (บาท)</span>
                        <input id="pos-discount" type="number" min="0" step="0.01" value="0" class="w-24 px-2 py-1 rounded border border-border text-right" />
                    </div>
                    <div class="flex justify-between font-semibold text-base border-t border-border pt-2">
                        <span>สุทธิ</span><span id="pos-total">0.00</span>
                    </div>
                </div>
            </div>

            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">ชำระเงิน (แยกจ่ายได้)</h2>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs text-muted-foreground">เงินสด</label>
                        <input id="pos-pay-cash" type="number" min="0" step="0.01" class="w-full mt-1 px-3 py-2 rounded-lg border border-border text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">โอน</label>
                        <input id="pos-pay-transfer" type="number" min="0" step="0.01" class="w-full mt-1 px-3 py-2 rounded-lg border border-border text-sm" />
                    </div>
                </div>
                <button id="btn-checkout" class="w-full mt-4 px-4 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-lg">
                    ชำระเงิน
                </button>
            </div>
        </div>

        <div class="rounded-xl border bg-card p-4">
            <h2 class="font-medium mb-3">บิลล่าสุด</h2>
            <div id="pos-bills" class="max-h-[600px] overflow-y-auto"></div>
        </div>
    </div>
</div>
{{> end }}
