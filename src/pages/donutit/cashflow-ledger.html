{{> start title="กระทบยอด — DonutiT" hidePageHeader=true }}

<div class="p-4 lg:p-6" data-donutit-module="cashflow-ledger">
    <div class="mb-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 rounded-xl bg-primary/10 flex items-center justify-center">
                    <i class="ri-book-read-line text-xl text-primary"></i>
                </div>
                <div>
                    <h1 class="text-xl font-semibold text-foreground">กระทบยอด / สมุดรายวัน</h1>
                    <p class="text-sm text-muted-foreground">Ledger · ปิดวัน · Audit trail</p>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <!-- รายการเงิน -->
        <div class="xl:col-span-2 space-y-4">
            <div class="rounded-xl border bg-card p-4">
                <div class="flex flex-wrap gap-3 items-end">
                    <div>
                        <label class="text-xs text-muted-foreground">จากวันที่</label>
                        <input id="filter-from" type="date" class="block mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">ถึงวันที่</label>
                        <input id="filter-to" type="date" class="block mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <button id="btn-filter" class="px-4 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-lg hover:opacity-90">
                        ค้นหา
                    </button>
                </div>
                <p id="ledger-status" class="text-sm mt-2 text-muted-foreground"></p>
            </div>

            <div class="rounded-xl border bg-card overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full min-w-[640px]">
                        <thead class="bg-muted/50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">วันที่</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">ประเภท</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">ช่องทาง</th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-muted-foreground">จำนวน (บาท)</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-muted-foreground">รายละเอียด</th>
                                <th class="px-4 py-3 text-right text-xs font-medium text-muted-foreground"></th>
                            </tr>
                        </thead>
                        <tbody id="ledger-tbody">
                            <tr><td colspan="6" class="px-4 py-8 text-center text-muted-foreground">กำลังโหลด...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- แถบข้าง -->
        <div class="space-y-4">
            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">บันทึกรายการใหม่</h2>
                <div class="space-y-3">
                    <div>
                        <label class="text-xs text-muted-foreground">วันที่</label>
                        <input id="entry-date" type="date" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">ประเภท</label>
                        <select id="entry-type" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm">
                            <option value="INCOME">รายรับ</option>
                            <option value="EXPENSE">รายจ่าย</option>
                            <option value="TRANSFER_IN">โอนเข้า</option>
                            <option value="TRANSFER_OUT">โอนออก</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">ช่องทาง</label>
                        <select id="entry-channel" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm">
                            <option value="CASH">เงินสด</option>
                            <option value="TRANSFER">โอน</option>
                            <option value="CREDIT">เครดิต</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">จำนวนเงิน (บาท)</label>
                        <input id="entry-amount" type="number" min="0" step="0.01" placeholder="0.00" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <div>
                        <label class="text-xs text-muted-foreground">รายละเอียด</label>
                        <input id="entry-desc" type="text" placeholder="เช่น เปิดกะเช้า" class="w-full mt-1 px-3 py-2 rounded-lg border border-border bg-background text-sm" />
                    </div>
                    <button id="btn-add-entry" class="w-full px-4 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-lg hover:opacity-90">
                        บันทึก
                    </button>
                    <p id="form-status" class="text-sm text-muted-foreground"></p>
                </div>
            </div>

            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">ปิดวัน</h2>
                <input id="close-date" type="date" class="w-full px-3 py-2 rounded-lg border border-border bg-background text-sm mb-3" />
                <button id="btn-toggle-close" class="w-full px-4 py-2 text-sm font-medium bg-secondary text-secondary-foreground border border-border rounded-lg hover:bg-muted">
                    ปิดวัน (ล็อก)
                </button>
            </div>

            <div class="rounded-xl border bg-card p-4">
                <h2 class="font-medium mb-3">ประวัติปิดวัน</h2>
                <div id="daily-close-list" class="text-sm text-muted-foreground">กำลังโหลด...</div>
            </div>
        </div>
    </div>
</div>
{{> end }}
