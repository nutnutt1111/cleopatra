{{> start pageTitle="การแสดงผล" pageDescription="ปรับ Accent color และ Light / Dark mode" hideProfileButton=true }}

<div id="appearance-settings-page" class="space-y-6">
    <div class="bg-card text-card-foreground rounded-xl border border-border p-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
            <div>
                <h3 class="text-lg font-semibold">Accent Color</h3>
                <p class="text-sm text-muted-foreground">เลือกสีหลักของ dashboard — บันทึกอัตโนมัติ</p>
            </div>
            <button id="reset-theme-btn" type="button"
                class="px-4 py-2 text-sm font-medium border border-border rounded-xl hover:bg-muted transition-colors">
                Reset theme
            </button>
        </div>

        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4" id="theme-preview-grid">
            <button data-theme="neutral" class="theme-preview-btn group p-4 rounded-xl border-2 border-border hover:border-muted-foreground transition-all cursor-pointer bg-card">
                <div class="w-full aspect-square rounded-lg bg-gray-900 mb-3 group-hover:scale-105 transition-transform"></div>
                <p class="text-sm font-medium">Neutral</p>
            </button>
            <button data-theme="blue" class="theme-preview-btn group p-4 rounded-xl border-2 border-border hover:border-blue-400 transition-all cursor-pointer bg-card">
                <div class="w-full aspect-square rounded-lg bg-blue-500 mb-3 group-hover:scale-105 transition-transform"></div>
                <p class="text-sm font-medium">Blue</p>
            </button>
            <button data-theme="green" class="theme-preview-btn group p-4 rounded-xl border-2 border-border hover:border-emerald-400 transition-all cursor-pointer bg-card">
                <div class="w-full aspect-square rounded-lg bg-emerald-500 mb-3 group-hover:scale-105 transition-transform"></div>
                <p class="text-sm font-medium">Green</p>
            </button>
            <button data-theme="orange" class="theme-preview-btn group p-4 rounded-xl border-2 border-border hover:border-orange-400 transition-all cursor-pointer bg-card">
                <div class="w-full aspect-square rounded-lg bg-orange-500 mb-3 group-hover:scale-105 transition-transform"></div>
                <p class="text-sm font-medium">Orange</p>
            </button>
            <button data-theme="rose" class="theme-preview-btn group p-4 rounded-xl border-2 border-border hover:border-rose-400 transition-all cursor-pointer bg-card">
                <div class="w-full aspect-square rounded-lg bg-rose-500 mb-3 group-hover:scale-105 transition-transform"></div>
                <p class="text-sm font-medium">Rose</p>
            </button>
        </div>
    </div>

    <div class="bg-card text-card-foreground rounded-xl border border-border p-6">
        <h3 class="text-lg font-semibold mb-2">Light / Dark Mode</h3>
        <p class="text-sm text-muted-foreground mb-4">Live preview — บันทึกใน localStorage</p>
        <div class="flex flex-wrap gap-3">
            <button id="light-mode-btn" type="button"
                class="px-4 py-2 text-sm font-medium bg-background border border-border rounded-lg hover:bg-muted transition-colors flex items-center gap-2">
                <i class="ri-sun-line"></i> Light Mode
            </button>
            <button id="dark-mode-btn" type="button"
                class="px-4 py-2 text-sm font-medium bg-primary text-primary-foreground rounded-lg hover:opacity-90 transition-colors flex items-center gap-2">
                <i class="ri-moon-line"></i> Dark Mode
            </button>
        </div>
    </div>
</div>

{{> end }}
